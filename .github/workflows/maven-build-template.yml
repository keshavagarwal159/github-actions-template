name: Maven Build Template

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.java.binaries=target/classes -Dsonar.sources=src/main/java -Dsonar.tests=src/test/java

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: Dockerfile

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target/

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            980637429038.dkr.ecr.ap-south-1.amazonaws.com/team2-demo-app:${{ github.run_number }}
            980637429038.dkr.ecr.ap-south-1.amazonaws.com/team2-demo-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: menifest.yml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ap-south-1

      - name: Update image tag in manifest
        run: |
          sed -i 's|team2-demo-app:.*|team2-demo-app:${{ github.run_number }}|' menifest.yml

      - name: Deploy to Kubernetes
        run: kubectl apply -f menifest.yml

      - name: Verify Deployment
        run: kubectl rollout status deployment/kubeproject -n keshav --timeout=120s
